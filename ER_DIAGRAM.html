<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Diagram</title>
  <style>
    body {
      margin: 0;
      background: #242424;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: "Times New Roman", serif;
    }
    svg {
      width: 1400px;
      height: 980px;
      background: #242424;
    }
    .entity {
      fill: #f5f5f5;
      stroke: #111;
      stroke-width: 2;
    }
    .relation {
      fill: #f5f5f5;
      stroke: #111;
      stroke-width: 2;
    }
    .attr {
      fill: #f5f5f5;
      stroke: #111;
      stroke-width: 1.6;
    }
    .line {
      stroke: #111;
      stroke-width: 1.8;
      fill: none;
    }
    .label {
      fill: #111;
      font-size: 29px;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .attr-label {
      fill: #111;
      font-size: 20px;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .caption {
      fill: #f5f5f5;
      font-size: 48px;
      font-weight: 600;
      text-anchor: middle;
    }
  </style>
</head>
